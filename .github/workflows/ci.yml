# =============================================================================
# CI - Lint, Imports, Testes e Validação
# =============================================================================
name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "1.8.2"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint de código (ruff, black, isort)
  # ---------------------------------------------------------------------------
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: lint-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            lint-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Instalar dependências
        run: poetry install --no-interaction --no-root

      - name: Ruff (linter)
        run: poetry run ruff check src/ api/ tests/ scripts/

      - name: Black (formatação)
        run: poetry run black --check src/ api/ tests/ scripts/

      - name: isort (ordenação de imports)
        run: poetry run isort --check-only src/ api/ tests/ scripts/

  # ---------------------------------------------------------------------------
  # Job 2: Verificação de importações e ambiente Poetry
  # ---------------------------------------------------------------------------
  imports:
    name: "📦 Imports & Ambiente"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: imports-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            imports-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Instalar dependências
        run: poetry install --no-interaction --no-root

      - name: Verificar sintaxe Python (todos os arquivos)
        run: |
          echo "=== Verificando sintaxe ==="
          poetry run python -c "
          import ast, pathlib, sys

          errors = []
          for pattern in ['src/**/*.py', 'api/**/*.py', 'tests/**/*.py', 'scripts/**/*.py']:
              for py_file in pathlib.Path('.').glob(pattern):
                  if '__pycache__' in str(py_file):
                      continue
                  try:
                      with open(py_file) as f:
                          ast.parse(f.read(), filename=str(py_file))
                  except SyntaxError as e:
                      errors.append(f'{py_file}:{e.lineno} - {e.msg}')

          if errors:
              print('Erros de sintaxe encontrados:')
              for err in errors:
                  print(f'  {err}')
              sys.exit(1)
          print('Sintaxe OK em todos os arquivos')
          "

      - name: Verificar importações dos módulos src
        run: |
          echo "=== Importando módulos src ==="
          poetry run python -c "
          import sys
          sys.path.insert(0, '.')

          modules = [
              'src.config',
              'src.enums',
              'src.logger',
              'src.utils',
              'src.preprocessing',
              'src.feature_engineering',
              'src.pipeline',
              'src.evaluate',
              'src.inference',
              'src.interpret',
              'src.monitoring',
              'src.optimization',
              'src.notebook_utils',
          ]

          failed = []
          for mod in modules:
              try:
                  __import__(mod)
                  print(f' {mod}')
              except Exception as e:
                  failed.append((mod, str(e)))
                  print(f' {mod}: {e}')

          if failed:
              print(f'\n{len(failed)} módulo(s) falharam:')
              for mod, err in failed:
                  print(f'  {mod}: {err}')
              sys.exit(1)
          print(f'\n Todos os {len(modules)} módulos importados com sucesso')
          "

      - name: Verificar importações da API
        run: |
          echo "=== Importando módulos da API ==="
          poetry run python -c "
          import sys
          sys.path.insert(0, '.')

          modules = [
              'api.core.config',
              'api.core.logging',
              'api.schemas.prediction',
              'api.schemas.drift',
              'api.services.model_service',
              'api.routes.health',
              'api.routes.prediction',
              'api.routes.interpret',
              'api.routes.drift',
              'api.main',
          ]

          failed = []
          for mod in modules:
              try:
                  __import__(mod)
                  print(f'  {mod}')
              except Exception as e:
                  failed.append((mod, str(e)))
                  print(f'  {mod}: {e}')

          if failed:
              print(f'\n{len(failed)} módulo(s) falharam:')
              for mod, err in failed:
                  print(f'  {mod}: {err}')
              sys.exit(1)
          print(f'\nTodos os {len(modules)} módulos da API importados com sucesso')
          "

      - name: Verificar consistência pyproject.toml / poetry.lock
        run: poetry check --lock

  # ---------------------------------------------------------------------------
  # Job 3: Testes unitários e de integração
  # ---------------------------------------------------------------------------
  tests:
    name: "🧪 Testes"
    runs-on: ubuntu-latest
    needs: [lint, imports]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: tests-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            tests-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Instalar dependências
        run: poetry install --no-interaction --no-root

      - name: Executar testes com cobertura
        run: |
          poetry run pytest tests/ \
            -v \
            --tb=short \
            --cov=src \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 4: Validação do Pipeline ML e Monitoramento
  # ---------------------------------------------------------------------------
  ml-validation:
    name: "🤖 Validação ML"
    runs-on: ubuntu-latest
    needs: [lint, imports]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ml-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ml-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Instalar dependências
        run: poetry install --no-interaction --no-root

      - name: Validar pipeline de ML (classes e enums)
        run: |
          poetry run python -c "
          from src.pipeline import ChurnPipeline
          from src.optimization import HyperparameterOptimizer, OptimizationConfig
          from src.enums import ModelType, DriftSeverity
          from src.evaluate import evaluate
          from src.feature_engineering import FeatureEngineer, AdvancedFeatureEngineer

          print('ChurnPipeline importado')
          print('HyperparameterOptimizer importado')
          print('ModelType/DriftSeverity disponíveis:', list(ModelType))
          print('evaluate() disponível')
          print('FeatureEngineer/AdvancedFeatureEngineer importados')
          "

      - name: Validar detecção de drift
        run: |
          poetry run python -c "
          import numpy as np
          from src.monitoring import population_stability_index

          np.random.seed(42)
          baseline = np.random.normal(0, 1, 1000)
          similar  = np.random.normal(0, 1, 1000)
          drifted  = np.random.normal(1, 1, 1000)

          psi_ok    = population_stability_index(baseline, similar)
          psi_drift = population_stability_index(baseline, drifted)

          assert psi_ok < 0.15, f'PSI sem drift deveria ser < 0.15, obteve {psi_ok:.4f}'
          assert psi_drift > 0.1, f'PSI com drift deveria ser > 0.1, obteve {psi_drift:.4f}'

          print(f'PSI sem drift:  {psi_ok:.4f} (< 0.15)')
          print(f'PSI com drift:  {psi_drift:.4f} (> 0.10)')
          print('Detecção de drift validada')
          "

      - name: Validar métricas disponíveis
        run: |
          poetry run python -c "
          from src.utils import normalize_metrics_keys

          raw = {
              'f1_score': 0.57, 'roc_auc': 0.83, 'auprc': 0.79,
              'accuracy': 0.80, 'precision': 0.65, 'recall': 0.52
          }
          normalized = normalize_metrics_keys(raw)
          expected = ['f1_score', 'roc_auc', 'auprc', 'accuracy', 'precision', 'recall']
          for key in expected:
              assert key in normalized, f'Métrica {key} não encontrada após normalização'

          print('Todas as métricas (incluindo AUPRC) normalizadas corretamente')
          "

  # ---------------------------------------------------------------------------
  # Job 5: Build Docker (somente main/develop)
  # ---------------------------------------------------------------------------
  docker:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: [tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (production)
        run: docker build --target production -t churn-api:${{ github.sha }} .

      - name: Build Docker image (dashboard)
        run: docker build --target dashboard -t churn-dashboard:${{ github.sha }} .

      - name: Verificar imagens
        run: |
          docker images churn-api:${{ github.sha }}
          docker images churn-dashboard:${{ github.sha }}
          echo "Docker images construídas com sucesso"

  # ---------------------------------------------------------------------------
  # Status final
  # ---------------------------------------------------------------------------
  ci-status:
    name: "✅ CI Status"
    runs-on: ubuntu-latest
    needs: [lint, imports, tests, ml-validation]
    if: always()

    steps:
      - name: Verificar resultados
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Lint falhou"
            exit 1
          fi
          if [ "${{ needs.imports.result }}" != "success" ]; then
            echo "Verificação de imports falhou"
            exit 1
          fi
          if [ "${{ needs.tests.result }}" != "success" ]; then
            echo "Testes falharam"
            exit 1
          fi
          if [ "${{ needs.ml-validation.result }}" != "success" ]; then
            echo "Validação ML falhou"
            exit 1
          fi
          echo "Todos os checks passaram!"
