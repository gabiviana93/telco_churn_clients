# =============================================================================
# Análise de Qualidade de Código (deep analysis)
# =============================================================================
name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "1.8.2"

jobs:
  quality:
    name: "Análise de Qualidade"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: quality-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Instalar dependências
        run: poetry install --no-interaction --no-root

      - name: Verificar funções grandes (>50 linhas)
        continue-on-error: true
        run: |
          poetry run python -c "
          import ast, pathlib

          class FunctionAnalyzer(ast.NodeVisitor):
              def __init__(self):
                  self.large = []
                  self.file = None

              def visit_FunctionDef(self, node):
                  lines = node.end_lineno - node.lineno
                  if lines > 50:
                      self.large.append((self.file, node.name, lines))
                  self.generic_visit(node)

          analyzer = FunctionAnalyzer()
          for py_file in pathlib.Path('src').glob('**/*.py'):
              if '__pycache__' not in str(py_file):
                  analyzer.file = str(py_file)
                  with open(py_file) as f:
                      try:
                          tree = ast.parse(f.read())
                          analyzer.visit(tree)
                      except SyntaxError:
                          pass

          if analyzer.large:
              print('Funções grandes (>50 linhas):')
              for file, name, lines in sorted(analyzer.large, key=lambda x: -x[2]):
                  print(f'  {file}: {name}() — {lines} linhas')
          else:
              print('Todas as funções têm tamanho adequado')
          "

      - name: Verificar complexidade ciclomática
        continue-on-error: true
        run: |
          poetry run python -c "
          import ast, pathlib

          class ComplexityChecker(ast.NodeVisitor):
              def __init__(self):
                  self.results = []
                  self.file = None

              def visit_FunctionDef(self, node):
                  c = 1
                  for child in ast.walk(node):
                      if isinstance(child, (ast.If, ast.For, ast.While, ast.ExceptHandler,
                                            ast.BoolOp, ast.Assert)):
                          c += 1
                  if c > 10:
                      self.results.append((self.file, node.name, c))
                  self.generic_visit(node)

          checker = ComplexityChecker()
          for py_file in pathlib.Path('src').glob('**/*.py'):
              if '__pycache__' not in str(py_file):
                  checker.file = str(py_file)
                  with open(py_file) as f:
                      try:
                          checker.visit(ast.parse(f.read()))
                      except SyntaxError:
                          pass

          if checker.results:
              print('Alta complexidade ciclomática (>10):')
              for file, name, c in sorted(checker.results, key=lambda x: -x[2]):
                  print(f'  {file}: {name}() — complexidade {c}')
          else:
              print('Complexidade ciclomática OK')
          "

      - name: Verificar docstrings públicas faltando
        continue-on-error: true
        run: |
          poetry run python -c "
          import ast, pathlib

          missing = []
          for py_file in pathlib.Path('src').glob('**/*.py'):
              if '__pycache__' in str(py_file) or '__init__' in str(py_file):
                  continue
              with open(py_file) as f:
                  try:
                      tree = ast.parse(f.read())
                  except SyntaxError:
                      continue
              for node in ast.walk(tree):
                  if isinstance(node, (ast.FunctionDef, ast.ClassDef)):
                      if not node.name.startswith('_') and not ast.get_docstring(node):
                          missing.append(f'{py_file}:{node.lineno} {node.name}')

          if missing:
              print(f'{len(missing)} docstrings faltando em funções/classes públicas:')
              for m in missing[:10]:
                  print(f'  {m}')
              if len(missing) > 10:
                  print(f'  ... e mais {len(missing)-10}')
          else:
              print('Todas as funções/classes públicas têm docstrings')
          "

      - name: Type checking com mypy
        continue-on-error: true
        run: poetry run mypy src/ api/ --ignore-missing-imports --no-error-summary || true
