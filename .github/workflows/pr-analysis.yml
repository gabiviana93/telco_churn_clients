# =============================================================================
# PR - Análise e relatório de cobertura
# =============================================================================
name: PR Analysis

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "1.8.2"

jobs:
  pr-report:
    name: "📋 Relatório do PR"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: pr-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Instalar dependências
        run: poetry install --no-interaction --no-root

      - name: Listar arquivos Python modificados
        id: changed
        run: |
          FILES=$(git diff origin/${{ github.base_ref }} --name-only -- '*.py' | head -30)
          echo "Arquivos Python modificados:"
          echo "$FILES"
          echo "count=$(echo "$FILES" | grep -c '\.py$' || echo 0)" >> $GITHUB_OUTPUT

      - name: Executar testes com cobertura
        run: |
          poetry run pytest tests/ \
            -v --tb=short \
            --cov=src --cov=api \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Verificar lint
        run: |
          echo "=== Ruff ===" && poetry run ruff check src/ api/ tests/ scripts/ --output-format=concise || true
          echo "=== Black ===" && poetry run black --check --diff src/ api/ tests/ scripts/ 2>&1 | head -30 || true
          echo "=== isort ===" && poetry run isort --check-only --diff src/ api/ tests/ scripts/ 2>&1 | head -30 || true

      - name: Comentar no PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔍 CI Pipeline — Relatório do PR\n\n';
            body += '| Check | Status |\n|-------|--------|\n';
            body += `| Testes | ${{ job.status == 'success' && '✅' || '❌' }} |\n`;
            body += `| Arquivos Python alterados | ${{ steps.changed.outputs.count }} |\n`;
            body += '\n*Verifique os logs para detalhes.*';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
